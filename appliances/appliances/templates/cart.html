{% extends 'base.html' %}

{% block content %}
<div class="cart-container">
    <h1>Список служащих</h1>
    
    {% if cart_items %}
    <div class="cart-items">
        <div class="cart-header">
            <div>Имя</div>
            
            <div></div>
        </div>
        
        {% for item in cart_items %}
        <div class="cart-item">
            <div class="cart-product">
                <h3>{{ item.product.name }}</h3>
            </div>
           
            <div class="cart-quantity">
               
            </div>
            
            <div class="cart-remove">
                <a href="{% url 'cart_remove' item.product.id %}" class="btn-remove">Удалить</a>
            </div>
        </div>
        {% endfor %}
        
        <div class="cart-total">
         
            <a href="{% url 'checkout' %}" class="btn-primary">запрос на выдачу данных </a>
        </div>
    </div>
    {% else %}
    <p class="empty-cart">список пуст</p>

    <a href="{% url 'catalog' %}" class="btn-primary">Продолжить просмотр</a>
    {% endif %}
</div>
{% endblock %}
